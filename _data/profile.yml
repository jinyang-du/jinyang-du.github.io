short_bio_text_justify: false
short_bio: >-
  <p>
    I am a Ph.D. student in Computer Science and Technology at Beihang University, advised by
    <a href="https://scholar.google.com/citations?user=8VY7ZDcAAAAJ" target="_blank">Prof. Xianglong Liu</a>
    and <a href="https://scholar.google.com/citations?user=8i7Z15kAAAAJ" target="_blank">Prof. Ruihao Gong</a>.
    My research focuses on <strong>efficient training technologies for world models</strong>,
    with interests in scalable training, model compression, and system-algorithm co-design for generative AI.
  </p>
  <p>
    I received my B.S. in Computer Science and Technology from Beihang University, ranking in the top 10% of my cohort.
    My recent work includes a survey on low-bit LLMs, Triton-based low-bit FlashAttention operators, and near-lossless 4-bit LLM training.
  </p>

